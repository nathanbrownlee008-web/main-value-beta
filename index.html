<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Top Daily Tips</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<h1 class="logo-3d">Top Daily Tips</h1>

<div class="tabs">
<button id="tabBets">Value Bets</button>
<button id="tabTracker" class="active">Tracker</button>
</div>

<div class="bankroll-top">
<label>Starting Bankroll</label>
<input type="number" id="startingBankroll" value="250"/>
<button onclick="exportCSV()">Export CSV</button>
</div>

<div class="stats-grid">
<div>Bankroll<br><strong>£<span id="currentBankroll">0</span></strong></div>
<div>Profit<br><strong>£<span id="profit">0</span></strong></div>
<div>ROI<br><strong><span id="roi">0</span>%</strong></div>
<div>Win Rate<br><strong><span id="winrate">0</span>%</strong></div>
<div>Won<br><strong><span id="wins">0</span></strong></div>
<div>Lost<br><strong><span id="losses">0</span></strong></div>
<div>Avg Odds<br><strong><span id="avgOdds">0</span></strong></div>
</div>

<canvas id="chart"></canvas>

<div id="trackerTable"></div>

<script src="app.js"></script>
</body>
</html>
