<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Picks Dashboard Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
<h1>Picks Dashboard</h1>
<div class="tabs">
<button id="tabBets" class="active">Value Bets</button>
<button id="tabTracker">Tracker</button>
</div>
</header>

<section id="betsSection">
<div id="betsGrid"></div>
</section>

<section id="trackerSection" style="display:none;">
<div class="top-controls">
<label>Starting Bankroll</label>
<input type="number" id="startingBankroll" value="1000"/>
<button onclick="exportCSV()">Export CSV</button>
</div>

<div class="stats">
<div>Bankroll: £<span id="bankroll">0</span></div>
<div>Profit: £<span id="profit">0</span></div>
<div>ROI: <span id="roi">0</span>%</div>
<div>Win Rate: <span id="winrate">0</span>%</div>
</div>

<canvas id="chart"></canvas>
<div id="trackerTable"></div>
</section>

<script src="app.js"></script>
</body>
</html>
